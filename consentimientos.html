<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Consentimientos Informados – Clínica Dental Anáhuac Xalapa</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--or:#F05A22;--or50:#FFF3EC;--or800:#8C3309;--bk:#111;--gr:#6b7280;--bd:#e5e7eb}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f9fafb;color:var(--bk);min-height:100vh}
header{background:var(--or);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:14px}
.back-btn{display:flex;align-items:center;gap:6px;font-size:12px;color:#fff;text-decoration:none;border:1px solid rgba(255,255,255,.45);border-radius:7px;padding:5px 11px;background:rgba(255,255,255,.15);flex-shrink:0;margin-left:auto}
.back-btn:hover{background:rgba(255,255,255,.28)}
header img{width:48px;height:48px;border-radius:6px}
header h1{font-size:18px;font-weight:800;line-height:1.2}
header p{font-size:12px;opacity:.85}
.wrap{max-width:960px;margin:20px auto;padding:0 16px;display:grid;gap:16px}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:22px}
.card h2{font-size:14px;font-weight:700;color:var(--or800);margin-bottom:14px;border-bottom:2px solid var(--or50);padding-bottom:7px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg.g3{grid-template-columns:1fr 1fr 1fr}
.full{grid-column:1/-1}
label{display:block;font-size:11px;font-weight:600;color:var(--gr);margin-bottom:3px}
input,select,textarea{width:100%;border:1px solid var(--bd);border-radius:7px;padding:7px 11px;font-size:13px;color:var(--bk);outline:none;transition:border .15s}
input:focus,select:focus,textarea:focus{border-color:var(--or)}
textarea{resize:vertical;min-height:60px}
.acwrap{position:relative}
.aclist{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--bd);border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:50;max-height:200px;overflow-y:auto;display:none}
.aclist.open{display:block}
.acitem{padding:8px 12px;cursor:pointer;font-size:12px}
.acitem:hover{background:var(--or50)}
.checkgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:6px}
.chk{display:flex;align-items:flex-start;gap:6px;font-size:12px;line-height:1.35;cursor:pointer}
.chk input{width:14px;height:14px;accent-color:var(--or);flex-shrink:0;margin-top:2px}
.siggrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.sigbox label{font-size:11px;font-weight:600;color:var(--gr);display:block;margin-bottom:5px}
.sigbox canvas{width:100%;height:100px;border:1px solid var(--bd);border-radius:7px;touch-action:none;cursor:crosshair;background:#fafafa;display:block}
.sigclear{font-size:10px;color:var(--or);cursor:pointer;float:right;margin-top:3px}
.li{border:1px solid var(--bd);border-radius:9px;padding:12px 15px;display:flex;align-items:center;gap:10px;margin-bottom:7px}
.li:hover{border-color:var(--or);background:var(--or50)}
.li-info{flex:1}
.li-title{font-weight:700;font-size:13px}
.li-meta{font-size:11px;color:var(--gr);margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.87}
.bor{background:var(--or);color:#fff}
.bout{background:#fff;color:var(--or);border:1px solid var(--or)}
.bred{background:#ef4444;color:#fff}
.bsm{padding:5px 10px;font-size:11px;border-radius:6px}
.rowbtn{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.tabs{display:flex;gap:8px;margin-bottom:18px}
.tab{padding:7px 16px;border-radius:7px;border:1px solid var(--bd);background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:var(--gr)}
.tab.active{background:var(--or);color:#fff;border-color:var(--or)}
.hide{display:none!important}
.badge{display:inline-block;background:var(--or50);color:var(--or800);border:1px solid var(--or);border-radius:20px;padding:1px 8px;font-size:10px;font-weight:700}
</style>
</head>

<script>
// ── Storage ─────────────────────────────────────────────────────────────────
const KEY = 'clinica_consentimientos_v1';
const load = () => { try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return[]} };
const save = a  => localStorage.setItem(KEY, JSON.stringify(a));

// ── Catálogos ────────────────────────────────────────────────────────────────
const getPacsObjs = () => { try{const d=localStorage.getItem('clinica_dental_data_v1'); if(!d)return[]; const obj=JSON.parse(d); return(obj.expedientes||[]).filter(Boolean);}catch(e){return[]} };
const getPacs = () => getPacsObjs().map(p=>p.nombre||p.paciente||'').filter(Boolean);
const getAlus = () => { try{const d=JSON.parse(localStorage.getItem('clinica_alumnos_v1')||'{}'); return(d.alumnos||[]).map(a=>a.nombre||'').filter(Boolean)}catch(e){return[]} };
const getDocs = () => { try{const d=JSON.parse(localStorage.getItem('clinica_maestros_v1')||'{}'); return(d.maestros||[]).map(m=>m.nombre||'').filter(Boolean)}catch(e){return[]} };

// ── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(t){
  document.getElementById('tab-form').classList.toggle('hide', t!=='form');

  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='form')||(i===1&&t==='list')));
  if(t==='list') renderList();
}

function onTipo(){
  const t = document.getElementById('f-tipo').value;
  // testigo

  const hasActos = !!ACTOS[t];
  document.getElementById('card-actos').classList.toggle('hide', !hasActos);
  if(hasActos){
    document.getElementById('actos-cont').innerHTML = ACTOS[t].map((a,i)=>
      `<label class="chk"><input type="checkbox" id="ac${i}" value="${a.replace(/"/g,'&quot;')}"> ${a}</label>`).join('');
  }
  // uax
  document.getElementById('row-dom').classList.toggle('hide', t!=='uax');
  document.getElementById('row-ced').classList.toggle('hide', t!=='uax');
  // cirugia

  // pediatria

// ── Autocomplete ──────────────────────────────────────────────────────────────
const ACS = {pac:{inp:'f-pac',lst:'ac-pac',src:getPacs}, alu:{inp:'f-alu',lst:'ac-alu',src:getAlus}, doc:{inp:'f-doc',lst:'ac-doc',src:getDocs}};
function acFilt(k){
  const v=document.getElementById(ACS[k].inp).value.toLowerCase();
  const l=document.getElementById(ACS[k].lst);
  const opts=ACS[k].src().filter(n=>n.toLowerCase().includes(v));
  if(!v||!opts.length){l.classList.remove('open');return;}
  l.innerHTML=opts.slice(0,8).map(n=>`<div class="acitem" onclick="acSel('${k}','${n.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">${n}</div>`).join('');
  l.classList.add('open');
}
function acSel(k,v){
  document.getElementById(ACS[k].inp).value=v;
  document.getElementById(ACS[k].lst).classList.remove('open');
  // Auto-fill fields when patient is selected
  if(k==='pac'){
    const obj=getPacsObjs().find(p=>(p.nombre||p.paciente||'')=== v);
    if(obj){
      if(obj.telefono) document.getElementById('f-tel').value=obj.telefono;
      if(obj.edad)     document.getElementById('f-edad').value=obj.edad;
      if(obj.alumno)   document.getElementById('f-alu').value=obj.alumno;
    }
  }
}
document.addEventListener('click',e=>{
  Object.keys(ACS).forEach(k=>{
    if(!document.getElementById(ACS[k].inp).contains(e.target))
      document.getElementById(ACS[k].lst).classList.remove('open');
  });
});

// ── Canvas signatures ─────────────────────────────────────────────────────────
const SIGS = {};
function setupSig(id){
  const cv=document.getElementById(id), ctx=cv.getContext('2d');
  function resize(){
    const r=cv.getBoundingClientRect();
    const pr=window.devicePixelRatio||1;
    cv.width=r.width*pr; cv.height=r.height*pr;
    ctx.scale(pr,pr);
    ctx.strokeStyle='#111';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';
  }
  resize();
  let drawing=false, lx=0, ly=0;
  function p(e){const r=cv.getBoundingClientRect(),s=e.touches?e.touches[0]:e;return[s.clientX-r.left,s.clientY-r.top];}
  cv.addEventListener('mousedown', e=>{drawing=true;[lx,ly]=p(e);});
  cv.addEventListener('mousemove', e=>{if(!drawing)return;ctx.beginPath();ctx.moveTo(lx,ly);[lx,ly]=p(e);ctx.lineTo(lx,ly);ctx.stroke();});
  cv.addEventListener('mouseup',   ()=>drawing=false);
  cv.addEventListener('mouseleave',()=>drawing=false);
  cv.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;[lx,ly]=p(e);},{passive:false});
  cv.addEventListener('touchmove', e=>{e.preventDefault();if(!drawing)return;ctx.beginPath();ctx.moveTo(lx,ly);[lx,ly]=p(e);ctx.lineTo(lx,ly);ctx.stroke();},{passive:false});
  cv.addEventListener('touchend',  ()=>drawing=false);
  SIGS[id]={cv,get:()=>cv.toDataURL(),clear:()=>ctx.clearRect(0,0,cv.width,cv.height)};
}
function clrSig(id){SIGS[id]&&SIGS[id].clear();}
function getSig(id){return SIGS[id]?SIGS[id].get():'';}

// ── Folio ─────────────────────────────────────────────────────────────────────
function nextFolio(){
  const arr=load();
  if(!arr.length)return'CI-0001';
  return'CI-'+String(Math.max(...arr.map(c=>parseInt((c.folio||'CI-0000').split('-')[1]||0)))+1).padStart(4,'0');
}

// ── Vista previa inline ───────────────────────────────────────────────────────

    edad:document.getElementById('f-edad').value,
    telefono:document.getElementById('f-tel').value.trim(),
    domicilio:document.getElementById('f-dom').value.trim(),
    cedula:document.getElementById('f-ced').value.trim(),

    alternativas:document.getElementById('f-alt').value.trim(),

    beneficio:document.getElementById('f-benef').value.trim(),
    testigo:'', fecha:document.getElementById('f-fecha').value, actos, sigs:{}
  };
  const tl=TLBL[tipo]||tipo;
  const norm='CON FUNDAMENTO EN LA LEY GENERAL DE SALUD. TÍTULO QUINTO Y CAPÍTULO ÚNICO, INVESTIGACIÓN PARA SALUD ARTÍCULO 100 FRACCIÓN IV. ARTÍCULOS 102 Y 103. NOM-168-SSA1-1998';
  const pacTable = (tipo==='general'||tipo==='uax') ? '' :
    `<table style="width:100%;border-collapse:collapse;margin-bottom:14px;font-size:12px">
      <tr><td style="border:1px solid #555;padding:5px 8px;font-weight:700;width:45%">NOMBRE DEL PACIENTE:</td><td style="border:1px solid #555;padding:5px 8px">${esc(tmp.paciente)}</td></tr>
      <tr><td style="border:1px solid #555;padding:5px 8px;font-weight:700">TUTOR / REP. LEGAL:</td><td style="border:1px solid #555;padding:5px 8px">${esc(tmp.tutor)||esc(tmp.paciente)}</td></tr>
      ${tmp.diagnostico?`<tr><td style="border:1px solid #555;padding:5px 8px;font-weight:700">DIAGNÓSTICO:</td><td style="border:1px solid #555;padding:5px 8px">${esc(tmp.diagnostico)}</td></tr>`:''}
      <tr><td style="border:1px solid #555;padding:5px 8px;font-weight:700">DR. QUE SUPERVISA:</td><td style="border:1px solid #555;padding:5px 8px">${esc(tmp.docente)}</td></tr>
      <tr><td style="border:1px solid #555;padding:5px 8px;font-weight:700">ESTUDIANTE:</td><td style="border:1px solid #555;padding:5px 8px">${esc(tmp.alumno)}</td></tr>
    </table>`;
  const card=document.getElementById('card-preview');
  document.getElementById('preview-body').innerHTML=
    `<div style="text-align:center;margin-bottom:14px;font-family:'Times New Roman',serif">
       <div style="font-size:16px;font-weight:900;color:#F05A22;text-transform:uppercase;margin-bottom:4px">${tl==='Carta de Autorización UAX'?'CARTA DE AUTORIZACIÓN Y CONSENTIMIENTO VALIDAMENTE INFORMADO':'CONSENTIMIENTO INFORMADO '+tl.toUpperCase()}</div>
       <div style="font-size:9px;color:#666;margin-bottom:6px">${norm}</div>
       <div style="font-size:12px;font-weight:700">Xalapa de Enríquez, Veracruz &nbsp;—&nbsp; ${tmp.fecha}</div>
     </div>
     ${pacTable}${getBody(tmp)}`;
  card.style.display='block';
  card.scrollIntoView({behavior:'smooth', block:'start'});
}

// ── Guardar ───────────────────────────────────────────────────────────────────
function guardar(){
  const tipo=document.getElementById('f-tipo').value;
  if(!tipo){alert('Seleccione el tipo de consentimiento.');return;}
  const pac=document.getElementById('f-pac').value.trim();
  if(!pac){alert('Ingrese el nombre del paciente.');return;}

  const actos=[];
  if(ACTOS[tipo]){
    document.querySelectorAll('#actos-cont input[type=checkbox]:checked').forEach(cb=>actos.push(cb.value));
  }

  const rec={
    folio:nextFolio(), tipo,
    fecha:document.getElementById('f-fecha').value||new Date().toISOString().slice(0,10),
    paciente:pac,
    tutor:document.getElementById('f-tutor').value.trim(),
    edad:document.getElementById('f-edad').value,
    telefono:document.getElementById('f-tel').value.trim(),
    domicilio:document.getElementById('f-dom').value.trim(),
    cedula:document.getElementById('f-ced').value.trim(),
    alumno:document.getElementById('f-alu').value.trim(),
    docente:document.getElementById('f-doc').value.trim(),
    diagnostico:document.getElementById('f-diag').value.trim(),
    notas:document.getElementById('f-notas').value.trim(),
    benefPed:document.getElementById('f-benef-ped').value.trim(),
    compPed:document.getElementById('f-comp-ped').value.trim(),
    riesgos:document.getElementById('f-riesgos').value.trim(),
    efectos:document.getElementById('f-efectos').value.trim(),
    alternativas:document.getElementById('f-alt').value.trim(),
    motivo:document.getElementById('f-motivo').value.trim(),
    beneficio:document.getElementById('f-benef').value.trim(),
    testigo:document.getElementById('f-testigo').value.trim(),
    actos,
    sigs:{pac:getSig('sp'),doc:getSig('sd'),testigo:getSig('st'),alu:getSig('sa')}
  };
  const arr=load(); arr.unshift(rec); save(arr);
  alert('Consentimiento '+rec.folio+' guardado correctamente.');
  resetForm();
  switchTab('list');
}

// ── Reset ─────────────────────────────────────────────────────────────────────
function resetForm(){
  document.getElementById('card-preview').style.display='none';
  ['f-tipo','f-pac','f-tutor','f-edad','f-tel','f-fecha','f-dom','f-ced',
   'f-alu','f-doc','f-diag','f-notas','f-benef-ped','f-comp-ped',
   'f-riesgos','f-efectos','f-alt','f-motivo','f-benef','f-testigo'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
  ['sp','sd','st','sa'].forEach(clrSig);
  ['card-actos','row-dom','row-ced','row-notas','row-benef-ped','row-comp-ped'].forEach(id=>document.getElementById(id).classList.add('hide'));
  document.getElementById('box-testigo').classList.remove('hide');
  document.getElementById('f-fecha').value=new Date().toISOString().slice(0,10);
}

// ── List ──────────────────────────────────────────────────────────────────────
function renderList(){
  const busq=(document.getElementById('fl-busq').value||'').toLowerCase();
  const tipo=document.getElementById('fl-tipo').value;
  const arr=load().filter(c=>{
    return(!tipo||c.tipo===tipo)&&
      (!busq||(c.paciente||'').toLowerCase().includes(busq)||(c.folio||'').toLowerCase().includes(busq)||(c.alumno||'').toLowerCase().includes(busq));
  });
  const cont=document.getElementById('list-cont');
  if(!arr.length){cont.innerHTML='<p style="color:var(--gr);text-align:center;padding:24px">Sin registros</p>';return;}
  cont.innerHTML=arr.map(c=>`
    <div class="li">
      <div class="li-info">
        <div class="li-title">${c.folio} &mdash; ${c.paciente} <span class="badge">${TLBL[c.tipo]||c.tipo}</span></div>
        <div class="li-meta">${c.fecha} &nbsp;|&nbsp; Alumno: ${c.alumno||'&mdash;'} &nbsp;|&nbsp; Docente: ${c.docente||'&mdash;'}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn bout bsm" onclick="imprimir('${c.folio}')">🖨 Imprimir</button>
        <button class="btn bred bsm" onclick="eliminar('${c.folio}')">✕</button>
      </div>
    </div>`).join('');
}

function eliminar(folio){
  if(!confirm('¿Eliminar consentimiento '+folio+'?'))return;
  save(load().filter(c=>c.folio!==folio));
  renderList();
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fld(v){return v?`<span style="text-decoration:underline;font-style:italic">${esc(v)}</span>`:'<span style="display:inline-block;min-width:120px;border-bottom:1px solid #555">&nbsp;</span>';}
function ul(v){return`<div style="min-height:18px;border-bottom:1px solid #555;margin-bottom:4px;font-style:italic;font-size:12px">${esc(v)||'&nbsp;'}</div>`;}
function li(items){return`<ul style="padding-left:20px;font-size:12px;line-height:1.9">${items.map(i=>`<li>${i}</li>`).join('')}</ul>`;}
function sec(title){return`<p style="font-weight:800;font-size:12px;margin:12px 0 4px">${title}</p>`;}
function sigBlock(label,dataUrl,nombre){
  const img=dataUrl&&dataUrl.length>100?`<img src="${dataUrl}" style="max-width:100%;height:65px;display:block;margin:0 auto">`:
    `<div style="height:65px"></div>`;
  return`<div style="text-align:center;padding:6px">
    ${img}

    <p style="font-size:12px;line-height:1.7;margin-bottom:6px"><strong>Técnicas de control de conducta:</strong> En caso de requerirse, se utilizarán técnicas de manejo de conducta (comunicación, desensibilización, refuerzo positivo/negativo, distracción contingente, modelado, control de voz, tiempo fuera). En caso de descontrol conductual y para mantener la integridad física del menor se podrá aplicar inmovilización protectora o mano sobre boca. En el caso de discapacidad física, psicoemocional, neurológica o condiciones especiales se hará recomendación de técnicas farmacológicas (sedación consciente o profunda).</p>

    ${sec('MOTIVO DE ELECCIÓN DEL TRATAMIENTO PROPUESTO:')}${ul(c.motivo)}
    ${sec('PROBABLES BENEFICIOS DEL TRATAMIENTO PROPUESTO:')}${ul(c.beneficio)}
    <p style="font-size:12px;line-height:1.7;margin-bottom:10px">De acuerdo a la norma oficial mexicana NOM-004-SSA3-2012, del expediente clínico, así como NOM-013-SSA2-2006, para la prevención y control de las enfermedades bucales, así como al derecho de los pacientes a ser informados.</p>

    <p style="font-size:12px;line-height:1.7;margin-bottom:8px">Que se realice en mi persona el acto médico autorizado y descrito con anterioridad, consiste en la realización del acto médico autorizado, así como el tratamiento que me fueron explicados y que me doy por enterado de mi declaración de manera libre, espontánea y sin presión alguna. Así mismo, autorizo al estomatólogo para la atención de contingencias y urgencias derivadas del acto médico autorizado atendiendo al principio de libertad prescriptiva. Acepto que no he omitido o alterado datos al exponer mi historial y antecedentes clínico-quirúrgicos, alergias y enfermedades o riesgos personales.</p>

  if(t==='periodoncia') return `

    ${sec('PROBABLES BENEFICIOS:')}
    <p style="font-size:12px;line-height:1.7;margin-bottom:8px">Eliminación de factores irritantes e infecciosos a nivel de los tejidos blandos, hueso alveolar, ligamento periodontal, cemento radicular para intentar mantener sanos los tejidos blandos y de soporte del diente(s) y evitar su pérdida.</p>

    <p style="font-size:12px;line-height:1.7;margin-bottom:6px">Todos los tratamientos dentro del ámbito de la salud, incluyendo la PERIODONCIA, tienen riesgos y limitaciones.</p>
    ${sec('RIESGOS:')}
    <p style="font-size:12px;line-height:1.7;margin-bottom:4px">a) Cada persona cicatriza de manera distinta. Pueden ocurrir formación de micro abscesos, retracción de encías, movilidad dental, dolor, edema, inflamación y hemorragia.</p>
    <p style="font-size:12px;line-height:1.7;margin-bottom:4px">b) Las complicaciones incluyen entre otras:</p>

    <p style="font-size:12px;line-height:1.7;margin-bottom:4px">c) En la cirugía podrá ser necesario tejidos de otras partes del cuerpo, implantes de materiales especiales médicos.</p>
    <p style="font-size:12px;line-height:1.7;margin-bottom:8px">d) Puede ser necesario el retratamiento, dependiendo de la agresividad de la enfermedad; es indispensable la correcta higiene y visitas periódicas de revisión (mantenimiento periodontal).</p>

    ${sec('MOTIVO DE ELECCIÓN DEL TRATAMIENTO PROPUESTO:')}${ul(c.motivo)}
    ${sec('PROBABLES BENEFICIOS DEL TRATAMIENTO PROPUESTO:')}${ul(c.beneficio)}
    <p style="font-size:12px;line-height:1.7;margin-bottom:10px">DE ACUERDO a la Norma Oficial Mexicana NOM-004-SSA3-2012, del expediente clínico, así como NOM-013-SSA2-2006, para la prevención y control de las enfermedades bucales, así como al derecho de los pacientes a ser informados.</p>

  if(t==='rehabilitacion') return `

    ${sec('PROBABLES BENEFICIOS:')}
    <p style="font-size:12px;line-height:1.7;margin-bottom:8px">Devolver al paciente la función, salud, estética del diente por medio de prótesis dentales fijas o removibles.</p>

    <p style="font-size:12px;line-height:1.7;margin-bottom:6px">Todos los tratamientos dentro del ámbito de la salud, incluyendo la colocación de PRÓTESIS, tienen riesgos y limitaciones.</p>

    <p style="font-size:12px;line-height:1.7;margin-bottom:4px">a) La colocación de estas restauraciones puede desencadenar alteraciones que afecten a la pulpa de forma permanente que haga necesario el tratamiento de endodoncia.</p>

    ${ACEPTO_BASE}`;

  if(t==='general') return `
    <p style="font-size:13px;line-height:1.8;margin-bottom:14px">Yo, <strong>${esc(c.paciente)}</strong> como persona legalmente responsable reconozco que el Estudiante: <strong>${esc(c.alumno)||'_______________'}</strong> supervisado por el Dr(a): <strong>${esc(c.docente)||'_______________'}</strong>, me ha <strong>PROPORCIONADO</strong> información sobre los procedimientos de prevención e información amplia y precisa de mi padecimiento en caso de padecerlos y he comprendido cuál es mi enfermedad y la necesidad de que se me practiquen diversos procedimientos odontológicos, médicos y/o quirúrgicos para confirmar o tratar mi enfermedad y mantener mi salud bucodental. Se me ha informado de los riesgos y complicaciones que pueden presentarse al practicar los distintos procedimientos odontológicos, médicos y/o quirúrgicos, los cuales son realizados por <strong>Estudiantes de la Escuela de Médico Cirujano Dentista</strong> y son supervisados por profesionales capacitados y con especialidades y <strong>AUTORIZO</strong> que los mismos sean realizados.</p>
    <p style="font-size:13px;line-height:1.8;margin-bottom:14px">Estoy consciente de que tanto el diagnóstico, procedimientos a realizar y presupuesto se incluyen en el plan de tratamiento anexo. <strong>ACEPTO Y ESTOY DE ACUERDO</strong> con la explicación y comentarios sobre mi tratamiento, en donde se me ha expresado los alcances, limitaciones y pronósticos que, de acuerdo con la exploración clínica y elementos de diagnóstico, se consideraron para mi tratamiento. Así mismo, estoy de acuerdo que se realizará por parte de profesionales de la Salud Bucal en Formación, con la asesoría de Profesores que de acuerdo con su criterio podrán intervenir o reasignar con algún otro especialista o alumno.</p>
    <p style="font-size:13px;line-height:1.8;margin-bottom:14px">En cumplimiento a la Ley Federal de Protección de Datos Personales en Posesión de los Particulares, <strong>INVESTIGACIÓN Y ESTUDIOS SUPERIORES, S.C.</strong>, con nombre comercial <strong>UNIVERSIDAD ANÁHUAC XALAPA</strong>, pone a disposición de los Titulares el presente Aviso de Privacidad con el objeto de informarles los alcances y condiciones generales del Tratamiento de sus datos personales, a fin de que estén en posibilidad de tomar decisiones informadas sobre su uso. Para más información puede consultar el completo aviso en la página de la Universidad en https://www.anahuac.mx/veracruz/xalapa.</p>
    <p style="font-size:13px;line-height:1.8;font-weight:700">Su información está registrada en una plataforma digital y sus datos se encuentran protegidos y serán usados responsablemente de acuerdo a la normatividad de la universidad y lo establecido en la Norma Oficial Mexicana NOM-004-SSA3-2012 del expediente clínico. Esta norma garantiza la calidad, seguridad y confidencialidad de la información clínica en México.</p>`;

    <p style="font-size:12px;line-height:1.8;margin-bottom:6px">6° No existe conducta dolosa y siempre el profesional ha buscado y velado por el bien, la integridad, la dignidad y la salud del paciente, conforme a los estatutos éticos y morales de nuestra sociedad actual.</p>

  const norm='CON FUNDAMENTO EN LA LEY GENERAL DE SALUD. TÍTULO QUINTO Y CAPÍTULO ÚNICO, INVESTIGACIÓN PARA SALUD ARTÍCULO 100 FRACCIÓN IV. ARTÍCULOS 102 Y 103. NOM-168-SSA1-1998, DEL EXPEDIENTE CLÍNICO EN SU NUMERAL 4.2';

  const headerExtra = c.tipo==='anestesia'?'CON FUNDAMENTO EN LA LEY GENERAL DE SALUD TÍTULO QUINTO CAPÍTULO ÚNICO, INVESTIGACIÓN PARA SALUD ARTÍCULO 100 FRACCIÓN IV. ARTÍCULOS 102 Y 103. NOM-168-SSA1-1998, DEL EXPEDIENTE CLÍNICO EN SU NUMERAL 4.2':
    c.tipo==='general'?'NORMA OFICIAL MEXICANA NOM-004-SSA3-2012, DEL EXPEDIENTE CLÍNICO — CONFORME NOM-168-SSA1-1998 DEL EXPEDIENTE CLÍNICO EN SUS NUMERALES 5.14, 6.1 AL 7.2 — NOM-013-SSA2-1994 PARA LA PREVENCIÓN Y CONTROL DE ENFERMEDADES BUCALES':
    c.tipo==='uax'?'De acuerdo a las normas oficiales mexicanas vigentes del expediente clínico médico y con fundamento en la ley general de salud.':norm;

  const pacTable = c.tipo==='uax'?'':
    c.tipo==='general'?'':
    `<table style="width:100%;border-collapse:collapse;margin-bottom:14px;font-size:12px">
      <tr><td style="border:1px solid #555;padding:5px 8px;font-weight:700">NOMBRE DEL PACIENTE:</td><td style="border:1px solid #555;padding:5px 8px">${esc(c.paciente)}</td></tr>
      <tr><td style="border:1px solid #555;padding:5px 8px;font-weight:700">NOMBRE DEL TUTOR O REPRESENTANTE LEGAL:</td><td style="border:1px solid #555;padding:5px 8px">${esc(c.tutor)||esc(c.paciente)}</td></tr>
      ${c.diagnostico?`<tr><td style="border:1px solid #555;padding:5px 8px;font-weight:700">DIAGNÓSTICO:</td><td style="border:1px solid #555;padding:5px 8px">${esc(c.diagnostico)}</td></tr>`:''}
      <tr><td style="border:1px solid #555;padding:5px 8px;font-weight:700">NOMBRE DEL DR. QUE SUPERVISA:</td><td style="border:1px solid #555;padding:5px 8px">${esc(c.docente)}</td></tr>
      <tr><td style="border:1px solid #555;padding:5px 8px;font-weight:700">NOMBRE DEL ESTUDIANTE:</td><td style="border:1px solid #555;padding:5px 8px">${esc(c.alumno)}</td></tr>
    </table>`;

  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>${tl} – ${c.folio}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Times New Roman',Times,serif;color:#111;font-size:12px;padding:28px 32px}
    @media print{body{padding:0}@page{margin:1.8cm 1.5cm}}
  </style></head><body>
  <div style="text-align:center;margin-bottom:18px">
    <img src="${LOGO}" width="72" height="72" style="border-radius:6px;margin-bottom:8px;display:block;margin-left:auto;margin-right:auto">
    <div style="font-size:18px;font-weight:900;color:#F05A22;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">
      ${c.tipo==='general'?'CONSENTIMIENTO INFORMADO DE ATENCIÓN ODONTOLÓGICA Y AVISO DE PRIVACIDAD DE DATOS':
        c.tipo==='uax'?'CARTA DE AUTORIZACIÓN Y CONSENTIMIENTO VALIDAMENTE INFORMADO':
        'CONSENTIMIENTO INFORMADO '+tl.toUpperCase()}
    </div>
    <div style="font-size:9px;color:#555;max-width:500px;margin:0 auto 10px">${headerExtra}</div>
    <div style="font-weight:700;font-size:12px">Xalapa de Enríquez, Veracruz de Ignacio de la Llave a ${c.fecha}</div>
  </div>
  ${pacTable}
  ${getBody(c)}
  ${getSigGrid(c)}
  <div style="margin-top:20px;text-align:center;font-size:9px;color:#888;border-top:1px solid #ddd;padding-top:8px">
    Clínica Dental Universitaria Anáhuac Xalapa &nbsp;|&nbsp; Folio: ${c.folio} &nbsp;|&nbsp; ${c.fecha}
  </div>
  <script>window.onload=()=>window.print();<\/script>
  </body></html>`;

  const w=window.open('','_blank','width=850,height=750');
  w.document.open();w.document.write(html);w.document.close();
}
